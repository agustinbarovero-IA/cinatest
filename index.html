<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sistema Grupo CINA</title>
<style>
:root{
  --bg-main:#001F60;
  --bg-deep:#00174a;
  --bg-dark:#000f30;
  --text:#ffffff;
  --text-soft:rgba(255,255,255,.82);
  --shadow-main:0 14px 28px rgba(0,0,0,.24);
  --radius-lg:20px;
  --gap:14px;
  --grid-max:1500px;
}
*{box-sizing:border-box}

html,body{
  margin:0;
  min-height:100vh;
  font-family:"Segoe UI",Inter,Tahoma,Verdana,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left,rgba(54,176,201,.22),transparent 26%),
    radial-gradient(circle at bottom right,rgba(0,168,135,.18),transparent 24%),
    linear-gradient(135deg,var(--bg-main),var(--bg-deep) 55%,var(--bg-dark));
  overflow:hidden;
}

body{min-height:100vh;}

.app-shell{
  display:grid;
  grid-template-rows:auto auto 1fr auto;
  gap:8px;
  padding:10px;
  min-height:100vh;
}

.topbar{
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  gap:14px;
  padding:10px 16px;
  border-radius:22px;
  background:rgba(255,255,255,.08);
  box-shadow:var(--shadow-main);
}

.brand{
  display:flex;
  align-items:center;
  gap:16px;
  min-width:0;
}

.brand img{
  height:54px;
  width:auto;
  object-fit:contain;
}

.brand-copy{min-width:0;}

.brand h1{
  margin:0;
  font-size:1.3rem;
  font-weight:700;
}

.brand p{
  margin:4px 0 0;
  color:var(--text-soft);
  font-size:.85rem;
}

.toolbar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.toolbar button{
  background:rgba(255,255,255,.1);
  border:0;
  color:white;
  padding:10px 14px;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
  transition:background .18s ease, transform .18s ease;
  font-size:.9rem;
}

.toolbar button:hover:not(:disabled){
  background:rgba(255,255,255,.18);
  transform:translateY(-1px);
}

.toolbar button:disabled{
  opacity:.45;
  cursor:not-allowed;
}

.toolbar .btn-user{
  background:linear-gradient(135deg,#36B0C9,#00A887);
}

.meta-panel{display:block}

.data-strip{
  display:grid;
  grid-template-columns:repeat(8,minmax(0,1fr));
  gap:7px;
}

.data-box{
  min-height:52px;
  border-radius:13px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:7px 9px;
  font-size:.74rem;
  font-weight:700;
  color:#fff;
  box-shadow:var(--shadow-main);
  line-height:1.08;
}

.data-box.green{background:linear-gradient(135deg,#047857,#059669)}
.data-box.red{background:linear-gradient(135deg,#b91c1c,#dc2626)}
.data-box.orange{background:linear-gradient(135deg,#ea580c,#f97316)}
.data-box.qr{
  background:linear-gradient(135deg,#001F60,#36B0C9);
  cursor:pointer;
  transition:transform .18s ease,filter .18s ease;
}
.data-box.qr:hover{
  transform:translateY(-2px);
  filter:brightness(1.05);
}

.data-content{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  width:100%;
}

.data-stack{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  line-height:1;
  gap:3px;
}

.data-number{
  font-size:1.45rem;
  font-weight:800;
}

.data-icon-round{
  width:20px;
  height:20px;
  border-radius:50%;
  border:2px solid currentColor;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:.82rem;
  font-weight:900;
  flex-shrink:0;
}

.data-label{
  font-size:.54rem;
  font-weight:700;
  letter-spacing:.2px;
  text-transform:uppercase;
  opacity:.95;
}

.data-qr-icon{
  width:22px;
  height:22px;
  border:2px solid #fff;
  position:relative;
  flex-shrink:0;
}

.data-qr-icon::before,
.data-qr-icon::after{
  content:"";
  position:absolute;
  background:#fff;
}

.data-qr-icon::before{
  left:4px;
  top:4px;
  width:5px;
  height:5px;
  box-shadow:8px 0 #fff,0 8px #fff,8px 8px #fff;
}

.data-qr-icon::after{
  right:4px;
  bottom:4px;
  width:7px;
  height:7px;
  box-shadow:-8px 0 #fff,0 -8px #fff;
}

.workspace{
  min-height:0;
  overflow:auto;
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

.menu-wrap{
  width:100%;
  max-width:var(--grid-max);
  min-height:0;
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

.menu-grid{
  display:grid;
  gap:var(--gap);
  justify-content:center;
  align-content:start;
  width:100%;
}

.menu-grid.layout-4x4{
  grid-template-columns:repeat(4,minmax(150px,1fr));
  max-width:900px;
}

.menu-grid.layout-8x2{
  grid-template-columns:repeat(8,minmax(120px,1fr));
  max-width:1320px;
}

.tile{
  min-height:140px;
  aspect-ratio:1/1;
  border:none;
  border-radius:var(--radius-lg);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  gap:14px;
  padding:16px 10px;
  color:white;
  font-weight:700;
  font-size:.95rem;
  text-transform:uppercase;
  box-shadow:var(--shadow-main);
  cursor:pointer;
  transition:transform .18s ease,filter .18s ease, box-shadow .18s ease;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.18);
}

.tile:hover{
  transform:translateY(-4px);
  filter:brightness(1.06);
  box-shadow:0 20px 40px rgba(0,0,0,.32);
}

.tile-icon{
  width:62px;
  height:62px;
  border-radius:18px;
  background:rgba(255,255,255,.18);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.8rem;
  flex-shrink:0;
  overflow:hidden;
}

.tile-icon img{
  display:block;
  max-width:48px;
  max-height:48px;
  object-fit:contain;
}

.tile-title{
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  line-height:1.1;
  min-height:2.6em;
  max-width:94%;
  word-break:normal;
  overflow-wrap:anywhere;
  hyphens:none;
}

.tile-title.two-lines{white-space:normal}
.tile-title.one-line{white-space:nowrap}

/* DASHBOARD LOGISTICA NACIONAL */
.dashboard-grid{
  width:100%;
  max-width:1500px;
  display:grid;
  grid-template-columns:repeat(4,minmax(280px,1fr));
  gap:10px;
  align-content:start;
}

.dashboard-card{
  min-height:96px;
  height:96px;
  border-radius:18px;
  padding:8px 10px;
  background:linear-gradient(135deg,#163A7A,#0C2554);
  box-shadow:var(--shadow-main);
  border:1px solid rgba(255,255,255,.18);
  display:grid;
  grid-template-columns:60px 1fr 68px;
  gap:8px;
  align-items:center;
  color:#fff;
  cursor:pointer;
  transition:transform .18s ease, filter .18s ease, box-shadow .18s ease;
}

.dashboard-card:hover{
  transform:translateY(-3px);
  filter:brightness(1.05);
  box-shadow:0 18px 34px rgba(0,0,0,.30);
}

.dashboard-left{
  display:flex;
  flex-direction:column;
  gap:6px;
  height:100%;
}

.dashboard-temp,
.dashboard-alert{
  border-radius:13px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#fff;
}

.dashboard-temp{
  min-height:46px;
  padding:5px 4px;
  flex:1;
}

.dashboard-alert{
  min-height:28px;
  padding:2px 4px;
  background:linear-gradient(135deg,#f59e0b,#ea580c);
}

.dashboard-temp-label{
  font-size:.45rem;
  font-weight:700;
  letter-spacing:.35px;
  text-transform:uppercase;
  opacity:.95;
}

.dashboard-temp-value{
  margin-top:2px;
  font-size:.88rem;
  font-weight:800;
  line-height:1;
}

.dashboard-alert-value{
  font-size:.88rem;
  font-weight:900;
  line-height:1;
}

.dashboard-main{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  min-width:0;
}

.dashboard-title{
  font-size:.72rem;
  font-weight:800;
  text-transform:uppercase;
  line-height:1.02;
  margin-bottom:4px;
  letter-spacing:.25px;
}

.dashboard-number{
  font-size:1.5rem;
  font-weight:900;
  line-height:1;
}

.dashboard-sub{
  margin-top:3px;
  font-size:.52rem;
  font-weight:700;
  letter-spacing:.45px;
  text-transform:uppercase;
  opacity:.85;
}

.dashboard-status-row{
  margin-top:3px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
}

.status-box{
  width:16px;
  height:16px;
  border-radius:4px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:.52rem;
  line-height:1;
  font-weight:700;
  color:#fff;
  border:1px solid rgba(255,255,255,.18);
}

.status-box.true-state{
  background:linear-gradient(135deg,#dc2626,#b91c1c);
}

.status-box.false-state{
  background:linear-gradient(135deg,#16a34a,#15803d);
}

.dashboard-clients{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:5px;
  align-content:center;
  justify-items:center;
}

.client-badge{
  width:24px;
  height:24px;
  border-radius:7px;
  background:rgba(255,255,255,.16);
  border:1px solid rgba(255,255,255,.18);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:.58rem;
  font-weight:800;
  text-transform:uppercase;
}

.client-badge.empty{
  opacity:.18;
}

/* DASHBOARD EQUIPAMIENTO */
/* DASHBOARD EQUIPAMIENTO */
.equipment-grid{
  width:100%;
  max-width:1500px;
  display:grid;
  grid-template-columns:repeat(4,minmax(260px,1fr));
  gap:10px;
  align-content:start;
}

.equipment-card{
  min-height:142px;
  height:142px;
  border-radius:16px;
  padding:10px 11px;
  box-shadow:var(--shadow-main);
  border:1px solid rgba(255,255,255,.16);
  display:flex;
  flex-direction:column;
  gap:6px;
  color:#fff;
  transition:transform .18s ease, filter .18s ease, box-shadow .18s ease;
  overflow:hidden;
}

.equipment-card:hover{
  transform:translateY(-2px);
  filter:brightness(1.04);
  box-shadow:0 16px 28px rgba(0,0,0,.28);
}

.equipment-card.state-running-card{
  background:linear-gradient(135deg,#166534,#15803d);
}

.equipment-card.state-charging-card{
  background:linear-gradient(135deg,#b45309,#ea580c);
}

.equipment-card.state-failure-card{
  background:linear-gradient(135deg,#991b1b,#dc2626);
}

.equipment-header{
  display:flex;
  align-items:center;
  gap:8px;
}

.equipment-icon{
  width:36px;
  height:36px;
  border-radius:10px;
  background:rgba(255,255,255,.14);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.05rem;
  flex-shrink:0;
}

.equipment-title-wrap{
  min-width:0;
}

.equipment-type{
  font-size:.74rem;
  font-weight:800;
  text-transform:uppercase;
  line-height:1.02;
}

.equipment-name{
  font-size:.64rem;
  color:rgba(255,255,255,.88);
  margin-top:2px;
  line-height:1.02;
}

.equipment-row{
  display:grid;
  grid-template-columns:74px 1fr;
  gap:6px;
  align-items:start;
  font-size:.64rem;
}

.equipment-label{
  color:rgba(255,255,255,.78);
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.15px;
}

.equipment-value{
  font-weight:700;
  line-height:1.08;
}

.state-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:76px;
  padding:4px 8px;
  border-radius:9px;
  font-size:.62rem;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.15px;
  background:rgba(255,255,255,.16);
}

.plant-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:4px 8px;
  border-radius:9px;
  background:rgba(255,255,255,.14);
  font-size:.62rem;
  font-weight:800;
  text-transform:uppercase;
}

@media(max-width:1200px){
  .dashboard-grid,
  .equipment-grid{
    grid-template-columns:repeat(3,minmax(240px,1fr));
  }
}

@media(max-width:900px){
  .dashboard-grid,
  .equipment-grid{
    grid-template-columns:repeat(2,minmax(240px,1fr));
  }
}

@media(max-width:780px){
  .dashboard-grid,
  .equipment-grid{
    grid-template-columns:1fr;
  }
}

.state-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:88px;
  padding:6px 10px;
  border-radius:10px;
  font-size:.7rem;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.2px;
}

.state-running{
  background:linear-gradient(135deg,#16a34a,#15803d);
}

.state-charging{
  background:linear-gradient(135deg,#f59e0b,#ea580c);
}

.state-failure{
  background:linear-gradient(135deg,#dc2626,#b91c1c);
}

.plant-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:6px 10px;
  border-radius:10px;
  background:rgba(255,255,255,.12);
  font-size:.7rem;
  font-weight:800;
  text-transform:uppercase;
}

.footer-bar{
  text-align:center;
  font-size:.74rem;
  opacity:.7;
}

@media(max-width:1200px){
  .menu-grid.layout-8x2{
    grid-template-columns:repeat(4,minmax(140px,1fr));
    max-width:900px;
  }
  .data-strip{
    grid-template-columns:repeat(4,minmax(0,1fr));
  }
  .dashboard-grid,
  .equipment-grid{
    grid-template-columns:repeat(3,minmax(260px,1fr));
  }
}

@media(max-width:900px){
  .dashboard-grid,
  .equipment-grid{
    grid-template-columns:repeat(2,minmax(260px,1fr));
  }
}

@media(max-width:780px){
  html,body{overflow:auto}
  .topbar{grid-template-columns:1fr}
  .menu-grid.layout-4x4,
  .menu-grid.layout-8x2{
    grid-template-columns:repeat(2,minmax(130px,1fr));
    max-width:100%;
  }
  .data-strip{
    grid-template-columns:repeat(2,minmax(0,1fr));
  }
  .tile{
    font-size:.9rem;
  }
  .dashboard-grid,
  .equipment-grid{
    grid-template-columns:1fr;
  }
  .dashboard-card{
    grid-template-columns:60px 1fr 68px;
  }
  .dashboard-number{
    font-size:1.3rem;
  }
  #fullscreenBtn{
    display:none;
  }
}
</style>
</head>
<body>
<div class="app-shell">
  <header class="topbar">
    <div class="brand">
      <img src="cina_logo_principal.png" alt="CINA">
      <div class="brand-copy">
        <h1 id="screenTitle">BIENVENIDOS AL SISTEMA DE GRUPO CINA</h1>
        <p id="screenSubtitle">SISTEMA DE GESTION DE OPERACIONES</p>
      </div>
    </div>
    <div class="toolbar">
      <button id="backBtn">← Volver</button>
      <button id="homeBtn">Inicio</button>
      <button id="fullscreenBtn">Pantalla completa</button>
      <button id="userBtn" class="btn-user">Administrar usuario</button>
    </div>
  </header>

  <section class="meta-panel">
    <div class="data-strip">
      <div class="data-box green"><div class="data-stack"><span class="data-label">TUNEL 2</span><span class="data-number">35</span><span class="data-label">09/03/2026 01:00</span></div></div>
      <div class="data-box green"><div class="data-stack"><span class="data-label">TUNEL 9</span><span class="data-number">45</span><span class="data-label">07/03/2026 02:00</span></div></div>
      <div class="data-box green"><div class="data-stack"><span class="data-label">TUNEL 10</span><span class="data-number">40</span><span class="data-label">06/03/2026 21:00</span></div></div>
      <div class="data-box green"><div class="data-stack"><span class="data-number">20</span><span class="data-label">VEHICULOS</span></div></div>
      <div class="data-box green"><div class="data-stack"><span class="data-number">6500</span><span class="data-label">ESTIBAS EN PLANTA</span></div></div>
      <div class="data-box qr" id="qrBox"><div class="data-content"><span class="data-qr-icon"></span><span>SCAN QR</span></div></div>
      <div class="data-box orange" id="sinUbicacionBox" style="cursor:pointer"><div class="data-content"><span class="data-icon-round">!</span><div class="data-stack"><span class="data-number">1050</span><span class="data-label">SIN UBICACION</span></div></div></div>
      <div class="data-box red" id="vencidasBox" style="cursor:pointer"><div class="data-content"><span class="data-icon-round">!</span><div class="data-stack"><span class="data-number">189</span><span class="data-label">VENCIDAS</span></div></div></div>
    </div>
  </section>

  <main class="workspace">
    <div class="menu-wrap">
      <div class="menu-grid" id="menuGrid"></div>
    </div>
  </main>

  <footer class="footer-bar">Sistema interno Grupo CINA</footer>
</div>

<script>
const menuTree = {
  title: 'INICIO',
  children: [
    { title: 'LOGISTICA NACIONAL', children: [
      { title: 'CARGAS', url: 'https://sistema.cinafrio.com/intranet/index.php/transporte_carga/index/fiscal/0' },

      { title: 'PRE SALIDAS', url: 'https://sistema.cinafrio.com/intranet/index.php/presalidas/list/salida/0/fiscal/0' },

    ]},
    { title: 'LOGISTICA FISCAL', children: [
      { title: 'CARGAS', url: 'https://sistema.cinafrio.com/intranet/index.php/transporte_carga/index/fiscal/1' },
      { title: 'PRE ENTRADAS', url: 'https://sistema.cinafrio.com/intranet/index.php/entradacarga/list/clasificada/0/fiscal/1' },
      { title: 'ENTRADAS', url: 'https://sistema.cinafrio.com/intranet/index.php/entradacarga/list/clasificada/1/fiscal/1' },
      { title: 'PRE SALIDAS', url: 'https://sistema.cinafrio.com/intranet/index.php/presalidas/list/salida/0/fiscal/1' },
      { title: 'SALIDAS', url: 'https://sistema.cinafrio.com/intranet/index.php/presalidas/list/salida/1/fiscal/1' },
      { title: 'REPORTE DEPOSITO FISCAL AFIP', url: 'https://sistema.cinafrio.com/intranet2/app.php/reportestockafip/' }
    ]},
    { title: 'CALIDAD', children: [
      { title: 'CONTROL DE ENTRADAS', url: 'https://sistema.cinafrio.com/intranet/index.php/carga/list/type/E' },
      { title: 'CONTROL DE SALIDAS', url: 'https://sistema.cinafrio.com/intranet/index.php/carga/list/type/S' },
      { title: 'CONTROL DE INTERVENCIONES', url: 'https://sistema.cinafrio.com/intranet/index.php/carga/listIntervenciones' },
      { title: 'VENCIMIENTO DE PRODUCTOS', url: 'https://sistema.cinafrio.com/intranet/index.php/infostock/vencimientos' },
      { title: 'ESTADISTICAS DE INTERVENCIONES', url: 'https://sistema.cinafrio.com/intranet/index.php/carga/estadisticas' }
    ]},
    { title: 'PORTERIA', children: [
      { title: 'INGRESOS EGRESOS', url: 'https://sistema.cinafrio.com/intranet/index.php/ingreso/index' }
    ]},
    { title: 'TRANSPORTE', children: [
      { title: 'DATOS DE VEHICULOS', children: [
        { title: 'ASEGURADORAS', url: 'https://sistema.cinafrio.com/intranet/index.php/transporte_aseguradora' },

function getTextInitials(text){
  return text.split(/\s+/).filter(Boolean).slice(0,2).map(word => word[0]).join('').toUpperCase();
}

function getIconMarkup(title){
  const imageMap = {
    'SISTEMA DE GESTION': 'iso_logo.png',
    'SENASA': 'senasa_logo.png'
  };

  if(imageMap[title]){
    return `<img src="${imageMap[title]}" alt="${title}" onerror="this.style.display='none'; this.parentElement.textContent='${getTextInitials(title)}';">`;
  }

  const symbolMap = {
    'LOGISTICA NACIONAL':'🚛',
    'LOGISTICA FISCAL':'📦',
    'CALIDAD':'🌡',
    'PORTERIA':'🚪',
    'TRANSPORTE':'🚚',

    'REPORTES':'📑',
    'DASHBOARD':'🖥',
    'ADMINISTRACION':'🗂',
    'RRHH':'👥',
    'MANTENIMIENTO':'🔧',
    'CONFIGURACION':'⚙',
    'PRODUCTOS':'📦',
    'OTROS SISTEMAS':'🧩',
    'INFORMACION DOCUMENTADA':'📚',
    'REGISTRO PR 44':'🗂',
    'FORMACION':'👨‍🏫'
  };

  return symbolMap[title] || getTextInitials(title);
}

function getGridLayout(count){
  return count > 8 ? 'layout-8x2' : 'layout-4x4';
}

function formatTitle(title){
  const words = title.trim().split(/\s+/);
  if(words.length <= 1) return title;
  if(words.length === 2) return words[0] + '<br>' + words[1];
  if(words.length === 3) return words[0] + ' ' + words[1] + '<br>' + words[2];
  if(words.length === 4) return words[0] + ' ' + words[1] + '<br>' + words[2] + ' ' + words[3];
  if(words.length === 5) return words[0] + ' ' + words[1] + '<br>' + words[2] + ' ' + words[3] + ' ' + words[4];
  const mid = Math.ceil(words.length / 2);
  return words.slice(0, mid).join(' ') + '<br>' + words.slice(mid).join(' ');
}

function titleClass(title){
  const words = title.trim().split(/\s+/).length;
  return words >= 2 ? 'two-lines' : 'one-line';
}

function openModule(url){
  window.open(url, '_blank', 'noopener,noreferrer');
}

function darkenColor(hex, amount){
  let color = hex.replace('#', '');
  if (color.length === 3) color = color.split('').map(c => c + c).join('');

  let r = parseInt(color.substring(0,2),16);
  let g = parseInt(color.substring(2,4),16);
  let b = parseInt(color.substring(4,6),16);

  r = Math.max(0, Math.min(255, r + amount));
  g = Math.max(0, Math.min(255, g + amount));
  b = Math.max(0, Math.min(255, b + amount));

  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

function getTileColors(item, level){
  const base = level === 0
    ? (mainColorMap[item.title] || '#001F60')
    : '#163A7A';

  const end = darkenColor(base, -28);
  return { start: base, end };
}

function buildClientSlots(clientes){
  const totalSlots = 6;
  const filled = clientes.slice(0, totalSlots);
  const emptyCount = totalSlots - filled.length;
  const slots = [];

  filled.forEach(cliente => {
    slots.push(`<div class="client-badge" title="${cliente}">${cliente}</div>`);
  });

  for(let i = 0; i < emptyCount; i++){
    slots.push(`<div class="client-badge empty"></div>`);
  }

  return slots.join('');
}

function getTemperatureStyle(temp){
  if(temp >= 0) return 'linear-gradient(135deg,#16a34a,#22c55e)';
  if(temp > -10) return 'linear-gradient(135deg,#0891b2,#06b6d4)';
  if(temp > -20) return 'linear-gradient(135deg,#2563eb,#3b82f6)';
  if(temp > -25) return 'linear-gradient(135deg,#4338ca,#6366f1)';
  return 'linear-gradient(135deg,#7e22ce,#a855f7)';
}

function formatTemperature(temp){
  return `${temp}°C`;
}

function buildStatusRow(item){
  const puertaClass = item.puerta ? 'true-state' : 'false-state';
  const ventiladorClass = item.ventilador ? 'true-state' : 'false-state';

  return `
    <div class="dashboard-status-row">
      <div class="status-box ${puertaClass}" title="Puerta">🚪</div>
      <div class="status-box ${ventiladorClass}" title="Ventilador">🌀</div>
    </div>
  `;
}

      <div class="equipment-row">
        <div class="equipment-label">Usuario</div>
        <div class="equipment-value">"${item.usuario}"</div>
      </div>
    `;

    equipmentGrid.appendChild(card);
  });

  menuGrid.appendChild(equipmentGrid);
  backBtn.disabled = historyStack.length === 0;
}

function renderNode(node){
  const items = node.children || [];
  const level = historyStack.length;

  screenTitle.textContent = level ? node.title : 'BIENVENIDOS AL SISTEMA DE GRUPO CINA';
  screenSubtitle.textContent = 'SISTEMA DE GESTION DE OPERACIONES';

  menuGrid.className = `menu-grid ${getGridLayout(items.length || 1)}`;
  menuGrid.innerHTML = '';

  if(!items.length){
    const tile = document.createElement('button');
    tile.className = 'tile';
    tile.type = 'button';
    tile.style.background = 'linear-gradient(135deg,#163A7A,#0C2554)';
    tile.innerHTML = `
      <div class="tile-icon">${getIconMarkup(node.title)}</div>
      <div class="tile-title ${titleClass(node.title)}">${formatTitle(node.title)}</div>
    `;
    if(node.url) tile.addEventListener('click', () => openModule(node.url));
    menuGrid.appendChild(tile);
  } else {
    items.forEach((item) => {
      const colors = getTileColors(item, level);
      const tile = document.createElement('button');
      tile.className = 'tile';
      tile.type = 'button';
      tile.style.background = `linear-gradient(135deg,${colors.start},${colors.end})`;
      tile.innerHTML = `
        <div class="tile-icon">${getIconMarkup(item.title)}</div>
        <div class="tile-title ${titleClass(item.title)}">${formatTitle(item.title)}</div>
      `;

      tile.addEventListener('click', () => {
        if(item.title === 'DASHBOARD LOGISTICA NACIONAL'){
          historyStack.push(node);
          renderDashboardLogisticaNacional();
          return;
        }

        if(item.title === 'DASHBOARD EQUIPAMIENTO'){
          historyStack.push(node);
          renderDashboardEquipamiento();
          return;
        }

        if(item.children){
          historyStack.push(node);
          renderNode(item);
          return;
        }

        if(item.url){
          openModule(item.url);
          return;
        }

        historyStack.push(node);
        renderNode({ title: item.title, url: item.url, children: [] });
      });

      menuGrid.appendChild(tile);
    });
  }

  backBtn.disabled = historyStack.length === 0;
}

backBtn.addEventListener('click', () => {
  if(!historyStack.length) return;
  const previous = historyStack.pop();
  renderNode(previous);
});

homeBtn.addEventListener('click', () => {
  historyStack.length = 0;
  renderNode(menuTree);
});

fullscreenBtn.addEventListener('click', () => {
  if(!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
});

userBtn.addEventListener('click', () => openModule('https://sistema.cinafrio.com/intranet2/app.php/persona/306/show'));
qrBox.addEventListener('click', () => openModule('https://sistema.cinafrio.com/intranet/index.php/estiba/scan'));
sinUbicacionBox.addEventListener('click', () => openModule('https://sistema.cinafrio.com/intranet/index.php/estiba/sinPosicion'));
vencidasBox.addEventListener('click', () => openModule('https://sistema.cinafrio.com/intranet/index.php/infostock/vencimientos'));

renderNode(menuTree);
</script>
</body>
</html>
