<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sistema Grupo CINA</title>
<style>
:root{
  --bg-main:#001F60;
  --bg-deep:#00174a;
  --bg-dark:#000f30;
  --text:#ffffff;
  --text-soft:rgba(255,255,255,.82);
  --shadow-main:0 14px 28px rgba(0,0,0,.24);
  --radius-lg:20px;
  --gap:14px;
  --grid-max:1500px;
}
*{box-sizing:border-box}

html,body{
  margin:0;
  min-height:100vh;
  font-family:"Segoe UI",Inter,Tahoma,Verdana,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left,rgba(54,176,201,.22),transparent 26%),
    radial-gradient(circle at bottom right,rgba(0,168,135,.18),transparent 24%),
    linear-gradient(135deg,var(--bg-main),var(--bg-deep) 55%,var(--bg-dark));
  overflow:hidden;
}

body{min-height:100vh;}

.app-shell{
  display:grid;
  grid-template-rows:auto auto 1fr auto;
  gap:8px;
  padding:10px;
  min-height:100vh;
}

.topbar{
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  gap:14px;
  padding:10px 16px;
  border-radius:22px;
  background:rgba(255,255,255,.08);
  box-shadow:var(--shadow-main);
}

.brand{
  display:flex;
  align-items:center;
  gap:16px;
  min-width:0;
}

.brand img{
  height:54px;
  width:auto;
  object-fit:contain;
}

.brand-copy{min-width:0;}

.brand h1{
  margin:0;
  font-size:1.3rem;
  font-weight:700;
}

.brand p{
  margin:4px 0 0;
  color:var(--text-soft);
  font-size:.85rem;
}

.toolbar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.toolbar button{
  background:rgba(255,255,255,.1);
  border:0;
  color:white;
  padding:10px 14px;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
  transition:background .18s ease, transform .18s ease;
  font-size:.9rem;
}

.toolbar button:hover:not(:disabled){
  background:rgba(255,255,255,.18);
  transform:translateY(-1px);
}

.toolbar button:disabled{
  opacity:.45;
  cursor:not-allowed;
}

.toolbar .btn-user{
  background:linear-gradient(135deg,#36B0C9,#00A887);
}

.meta-panel{display:block}

.data-strip{
  display:grid;
  grid-template-columns:repeat(8,minmax(0,1fr));
  gap:7px;
}

.data-box{
  min-height:52px;
  border-radius:13px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:7px 9px;
  font-size:.74rem;
  font-weight:700;
  color:#fff;
  box-shadow:var(--shadow-main);
  line-height:1.08;
}

.data-box.green{background:linear-gradient(135deg,#047857,#059669)}
.data-box.red{background:linear-gradient(135deg,#b91c1c,#dc2626)}
.data-box.orange{background:linear-gradient(135deg,#ea580c,#f97316)}
.data-box.qr{
  background:linear-gradient(135deg,#001F60,#36B0C9);
  cursor:pointer;
  transition:transform .18s ease,filter .18s ease;
}
.data-box.qr:hover{
  transform:translateY(-2px);
  filter:brightness(1.05);
}

.data-content{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  width:100%;
}

.data-stack{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  line-height:1;
  gap:3px;
}

.data-number{
  font-size:1.45rem;
  font-weight:800;
}

.data-icon-round{
  width:20px;
  height:20px;
  border-radius:50%;
  border:2px solid currentColor;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:.82rem;
  font-weight:900;
  flex-shrink:0;
}

.data-label{
  font-size:.54rem;
  font-weight:700;
  letter-spacing:.2px;
  text-transform:uppercase;
  opacity:.95;
}

.data-qr-icon{
  width:22px;
  height:22px;
  border:2px solid #fff;
  position:relative;
  flex-shrink:0;
}

.data-qr-icon::before,
.data-qr-icon::after{
  content:"";
  position:absolute;
  background:#fff;
}

.data-qr-icon::before{
  left:4px;
  top:4px;
  width:5px;
  height:5px;
  box-shadow:8px 0 #fff,0 8px #fff,8px 8px #fff;
}

.data-qr-icon::after{
  right:4px;
  bottom:4px;
  width:7px;
  height:7px;
  box-shadow:-8px 0 #fff,0 -8px #fff;
}

.workspace{
  min-height:0;
  overflow:auto;
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

.menu-wrap{
  width:100%;
  max-width:var(--grid-max);
  min-height:0;
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

.menu-grid{
  display:grid;
  gap:var(--gap);
  justify-content:center;
  align-content:start;
  width:100%;
}

.menu-grid.layout-4x4{
  grid-template-columns:repeat(4,minmax(150px,1fr));
  max-width:900px;
}

.menu-grid.layout-8x2{
  grid-template-columns:repeat(8,minmax(120px,1fr));
  max-width:1320px;
}

.tile{
  min-height:140px;
  aspect-ratio:1/1;
  border:none;
  border-radius:var(--radius-lg);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  gap:14px;
  padding:16px 10px;
  color:white;
  font-weight:700;
  font-size:.95rem;
  text-transform:uppercase;
  box-shadow:var(--shadow-main);
  cursor:pointer;
  transition:transform .18s ease,filter .18s ease, box-shadow .18s ease;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.18);
}

.tile:hover{
  transform:translateY(-4px);
  filter:brightness(1.06);
  box-shadow:0 20px 40px rgba(0,0,0,.32);
}

.tile-icon{
  width:62px;
  height:62px;
  border-radius:18px;
  background:rgba(255,255,255,.18);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.8rem;
  flex-shrink:0;
  overflow:hidden;
}

.tile-icon img{
  display:block;
  max-width:48px;
  max-height:48px;
  object-fit:contain;
}

.tile-title{
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  line-height:1.1;
  min-height:2.6em;
  max-width:94%;
  word-break:normal;
  overflow-wrap:anywhere;
  hyphens:none;
}

.tile-title.two-lines{white-space:normal}
.tile-title.one-line{white-space:nowrap}

/* DASHBOARD LOGISTICA NACIONAL */
.dashboard-grid{
  width:100%;
  max-width:1500px;
  display:grid;
  grid-template-columns:repeat(4,minmax(280px,1fr));
  gap:10px;
  align-content:start;
}

.dashboard-card{
  min-height:96px;
  height:96px;
  border-radius:18px;
  padding:8px 10px;
  background:linear-gradient(135deg,#163A7A,#0C2554);
  box-shadow:var(--shadow-main);
  border:1px solid rgba(255,255,255,.18);
  display:grid;
  grid-template-columns:60px 1fr 68px;
  gap:8px;
  align-items:center;
  color:#fff;
  cursor:pointer;
  transition:transform .18s ease, filter .18s ease, box-shadow .18s ease;
}

.dashboard-card:hover{
  transform:translateY(-3px);
  filter:brightness(1.05);
  box-shadow:0 18px 34px rgba(0,0,0,.30);
}

.dashboard-left{
  display:flex;
  flex-direction:column;
  gap:6px;
  height:100%;
}

.dashboard-temp,
.dashboard-alert{
  border-radius:13px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#fff;
}

.dashboard-temp{
  min-height:46px;
  padding:5px 4px;
  flex:1;
}

.dashboard-alert{
  min-height:28px;
  padding:2px 4px;
  background:linear-gradient(135deg,#f59e0b,#ea580c);
}

.dashboard-temp-label{
  font-size:.45rem;
  font-weight:700;
  letter-spacing:.35px;
  text-transform:uppercase;
  opacity:.95;
}

.dashboard-temp-value{
  margin-top:2px;
  font-size:.88rem;
  font-weight:800;
  line-height:1;
}

.dashboard-alert-value{
  font-size:.88rem;
  font-weight:900;
  line-height:1;
}

.dashboard-main{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  min-width:0;
}

.dashboard-title{
  font-size:.72rem;
  font-weight:800;
  text-transform:uppercase;
  line-height:1.02;
  margin-bottom:4px;
  letter-spacing:.25px;
}

.dashboard-number{
  font-size:1.5rem;
  font-weight:900;
  line-height:1;
}

.dashboard-sub{
  margin-top:3px;
  font-size:.52rem;
  font-weight:700;
  letter-spacing:.45px;
  text-transform:uppercase;
  opacity:.85;
}

.dashboard-status-row{
  margin-top:3px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
}

.status-box{
  width:16px;
  height:16px;
  border-radius:4px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:.52rem;
  line-height:1;
  font-weight:700;
  color:#fff;
  border:1px solid rgba(255,255,255,.18);
}

.status-box.true-state{
  background:linear-gradient(135deg,#dc2626,#b91c1c);
}

.status-box.false-state{
  background:linear-gradient(135deg,#16a34a,#15803d);
}

.dashboard-clients{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:5px;
  align-content:center;
  justify-items:center;
}

.client-badge{
  width:24px;
  height:24px;
  border-radius:7px;
  background:rgba(255,255,255,.16);
  border:1px solid rgba(255,255,255,.18);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:.58rem;
  font-weight:800;
  text-transform:uppercase;
}

.client-badge.empty{
  opacity:.18;
}

/* DASHBOARD EQUIPAMIENTO */
.equipment-grid{
  width:100%;
  max-width:1500px;
  display:grid;
  grid-template-columns:repeat(4,minmax(260px,1fr));
  gap:10px;
  align-content:start;
}

.equipment-card{
  min-height:142px;
  height:142px;
  border-radius:16px;
  padding:10px 11px;
  box-shadow:var(--shadow-main);
  border:1px solid rgba(255,255,255,.16);
  display:flex;
  flex-direction:column;
  gap:6px;
  color:#fff;
  transition:transform .18s ease, filter .18s ease, box-shadow .18s ease;
  overflow:hidden;
}

.equipment-card:hover{
  transform:translateY(-2px);
  filter:brightness(1.04);
  box-shadow:0 16px 28px rgba(0,0,0,.28);
}

.equipment-card.state-running-card{
  background:linear-gradient(135deg,#166534,#15803d);
}

.equipment-card.state-charging-card{
  background:linear-gradient(135deg,#b45309,#ea580c);
}

.equipment-card.state-failure-card{
  background:linear-gradient(135deg,#991b1b,#dc2626);
}

.equipment-header{
  display:flex;
  align-items:center;
  gap:8px;
}

.equipment-icon{
  width:36px;
  height:36px;
  border-radius:10px;
  background:rgba(255,255,255,.14);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.05rem;
  flex-shrink:0;
}

.equipment-title-wrap{
  min-width:0;
}

.equipment-type{
  font-size:.74rem;
  font-weight:800;
  text-transform:uppercase;
  line-height:1.02;
}

.equipment-name{
  font-size:.64rem;
  color:rgba(255,255,255,.88);
  margin-top:2px;
  line-height:1.02;
}

.equipment-row{
  display:grid;
  grid-template-columns:74px 1fr;
  gap:6px;
  align-items:start;
  font-size:.64rem;
}

.equipment-label{
  color:rgba(255,255,255,.78);
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.15px;
}

.equipment-value{
  font-weight:700;
  line-height:1.08;
}

.state-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:76px;
  padding:4px 8px;
  border-radius:9px;
  font-size:.62rem;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.15px;
  background:rgba(255,255,255,.16);
}

.plant-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:4px 8px;
  border-radius:9px;
  background:rgba(255,255,255,.14);
  font-size:.62rem;
  font-weight:800;
  text-transform:uppercase;
}

/* MAPA DE BOXES */
.boxes-wrap{
  width:100%;
  max-width:1200px;
  display:grid;
  gap:14px;
}

.boxes-header{
  background:linear-gradient(135deg,#163A7A,#0C2554);
  border:1px solid rgba(255,255,255,.18);
  border-radius:20px;
  box-shadow:var(--shadow-main);
  padding:18px;
}

.boxes-header h2{
  margin:0;
  font-size:1.25rem;
  font-weight:800;
}

.boxes-header p{
  margin:6px 0 0;
  font-size:.88rem;
  color:var(--text-soft);
}

.boxes-grid{
  display:grid;
  grid-template-columns:repeat(4,minmax(180px,1fr));
  gap:14px;
}

.box-card{
  min-height:150px;
  border:none;
  border-radius:18px;
  background:linear-gradient(135deg,#163A7A,#0C2554);
  border:1px solid rgba(255,255,255,.18);
  box-shadow:var(--shadow-main);
  color:#fff;
  padding:14px;
  cursor:pointer;
  transition:transform .18s ease, filter .18s ease, box-shadow .18s ease;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  text-align:left;
}

.box-card:hover{
  transform:translateY(-3px);
  filter:brightness(1.05);
  box-shadow:0 18px 34px rgba(0,0,0,.30);
}

.box-card-number{
  font-size:2rem;
  font-weight:900;
  line-height:1;
}

.box-card-title{
  font-size:.95rem;
  font-weight:800;
  text-transform:uppercase;
}

.box-card-meta{
  font-size:.76rem;
  color:var(--text-soft);
  line-height:1.2;
}

/* DETALLE ESTIBA */
.estiba-detail-wrap{
  width:100%;
  max-width:1100px;
  margin:0 auto;
  display:grid;
  gap:14px;
}

.estiba-header-card,
.estiba-info-card,
.estiba-actions-card,
.estiba-detail-card{
  background:linear-gradient(135deg,#163A7A,#0C2554);
  border:1px solid rgba(255,255,255,.18);
  border-radius:20px;
  box-shadow:var(--shadow-main);
  padding:18px;
}

.estiba-header-card{
  display:grid;
  grid-template-columns:1fr auto;
  gap:16px;
  align-items:center;
}

.estiba-title{
  margin:0;
  font-size:1.5rem;
  font-weight:800;
  line-height:1.05;
}

.estiba-subtitle{
  margin:6px 0 0;
  font-size:.88rem;
  color:var(--text-soft);
  font-weight:600;
}

.estiba-module-actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:flex-end;
}

.estiba-module-btn{
  border:none;
  border-radius:12px;
  padding:10px 14px;
  color:#fff;
  font-weight:800;
  cursor:pointer;
  transition:transform .18s ease, filter .18s ease;
}

.estiba-module-btn:hover{
  transform:translateY(-2px);
  filter:brightness(1.05);
}

.estiba-module-btn.logistica{background:linear-gradient(135deg,#36B0C9,#0891b2)}
.estiba-module-btn.calidad{background:linear-gradient(135deg,#E36B2C,#c2410c)}
.estiba-module-btn.salir{background:linear-gradient(135deg,#475569,#334155)}

.estiba-info-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:14px;
}

.estiba-info-box{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  border-radius:16px;
  padding:14px;
}

.estiba-info-label{
  font-size:.72rem;
  text-transform:uppercase;
  letter-spacing:.4px;
  color:rgba(255,255,255,.75);
  font-weight:800;
}

.estiba-info-value{
  margin-top:6px;
  font-size:1.05rem;
  font-weight:800;
}

.estiba-ocupacion{
  display:grid;
  gap:10px;
}

.estiba-ocupacion-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.estiba-progress{
  width:100%;
  height:18px;
  border-radius:999px;
  background:rgba(255,255,255,.12);
  overflow:hidden;
  border:1px solid rgba(255,255,255,.10);
}

.estiba-progress-bar{
  height:100%;
  border-radius:999px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
}

.estiba-actions-card{
  display:flex;
  justify-content:center;
}

.estiba-actions-grid{
  width:100%;
  max-width:760px;
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:14px;
}

.estiba-action-btn{
  border:none;
  border-radius:16px;
  min-height:78px;
  padding:14px;
  color:#fff;
  font-weight:800;
  font-size:.95rem;
  cursor:pointer;
  transition:transform .18s ease, filter .18s ease, box-shadow .18s ease;
  box-shadow:var(--shadow-main);
}

.estiba-action-btn:hover{
  transform:translateY(-3px);
  filter:brightness(1.05);
}

.estiba-action-btn.intervenir{background:linear-gradient(135deg,#E36B2C,#c2410c)}
.estiba-action-btn.fotos{background:linear-gradient(135deg,#36B0C9,#0284c7)}
.estiba-action-btn.temperaturas{background:linear-gradient(135deg,#00A887,#047857)}

.estiba-detail-title{
  margin:0 0 14px 0;
  font-size:1.05rem;
  font-weight:800;
  text-transform:uppercase;
}

.estiba-detail-table{
  display:grid;
  gap:10px;
}

.estiba-detail-row{
  display:grid;
  grid-template-columns:1.4fr .8fr;
  gap:12px;
  align-items:center;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.10);
  border-radius:14px;
  padding:12px 14px;
}

.estiba-detail-product{
  font-weight:700;
}

.estiba-detail-date{
  justify-self:end;
  font-weight:800;
  color:#fef08a;
}

.footer-bar{
  text-align:center;
  font-size:.74rem;
  opacity:.7;
}

/* MODO COMPACTO AUTOMATICO */
body.compact-mode .app-shell{
  gap:6px;
  padding:8px;
}

body.compact-mode .topbar{
  padding:8px 14px;
  gap:10px;
}

body.compact-mode .brand img{
  height:42px;
}

body.compact-mode .brand h1{
  font-size:1.02rem;
}

body.compact-mode .brand p{
  margin-top:2px;
  font-size:.72rem;
}

body.compact-mode .toolbar button{
  padding:8px 12px;
  font-size:.82rem;
}

body.compact-mode .data-strip{
  gap:6px;
}

body.compact-mode .data-box{
  min-height:44px;
  padding:6px 8px;
  font-size:.66rem;
}

body.compact-mode .data-number{
  font-size:1.15rem;
}

body.compact-mode .data-label{
  font-size:.48rem;
}

body.compact-mode .dashboard-grid{
  gap:8px;
}

body.compact-mode .dashboard-card{
  min-height:84px;
  height:84px;
  padding:7px 8px;
  grid-template-columns:54px 1fr 62px;
  gap:7px;
}

body.compact-mode .dashboard-temp{
  min-height:40px;
  padding:4px 3px;
}

body.compact-mode .dashboard-alert{
  min-height:24px;
}

body.compact-mode .dashboard-temp-label{
  font-size:.4rem;
}

body.compact-mode .dashboard-temp-value{
  font-size:.8rem;
}

body.compact-mode .dashboard-alert-value{
  font-size:.8rem;
}

body.compact-mode .dashboard-title{
  font-size:.64rem;
  margin-bottom:3px;
}

body.compact-mode .dashboard-number{
  font-size:1.28rem;
}

body.compact-mode .dashboard-sub{
  font-size:.48rem;
  margin-top:2px;
}

body.compact-mode .status-box{
  width:14px;
  height:14px;
  font-size:.48rem;
}

body.compact-mode .client-badge{
  width:22px;
  height:22px;
  font-size:.54rem;
}

body.compact-mode .equipment-grid{
  gap:8px;

function getIconMarkup(title){

  if(imageMap[title]){
    return `<img src="${imageMap[title]}" alt="${title}" onerror="this.style.display='none'; this.parentElement.textContent='${getTextInitials(title)}';">`;
  }

  const symbolMap = {
    'LOGISTICA NACIONAL':'🚛',

    'PORTERIA':'🚪',

}

function getGridLayout(count){

function formatTitle(title){
  const words = title.trim().split(/\s+/);
  if(words.length <= 1) return title;
  if(words.length === 2) return words[0] + '<br>' + words[1];
  if(words.length === 3) return words[0] + ' ' + words[1] + '<br>' + words[2];
  if(words.length === 4) return words[0] + ' ' + words[1] + '<br>' + words[2] + ' ' + words[3];
  if(words.length === 5) return words[0] + ' ' + words[1] + '<br>' + words[2] + ' ' + words[3] + ' ' + words[4];
  const mid = Math.ceil(words.length / 2);
  return words.slice(0, mid).join(' ') + '<br>' + words.slice(mid).join(' ');
}

function titleClass(title){
  const words = title.trim().split(/\s+/).length;
  return words >= 2 ? 'two-lines' : 'one-line';
}

function openModule(url){

function darkenColor(hex, amount){
  let color = hex.replace('#', '');
  if (color.length === 3) color = color.split('').map(c => c + c).join('');
  let r = parseInt(color.substring(0,2),16);
  let g = parseInt(color.substring(2,4),16);
  let b = parseInt(color.substring(4,6),16);
  r = Math.max(0, Math.min(255, r + amount));
  g = Math.max(0, Math.min(255, g + amount));
  b = Math.max(0, Math.min(255, b + amount));
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

function getTileColors(item, level){

  const end = darkenColor(base, -28);
  return { start: base, end };
}

function buildClientSlots(clientes){
  const totalSlots = 6;
  const filled = clientes.slice(0, totalSlots);
  const emptyCount = totalSlots - filled.length;
  const slots = [];

  filled.forEach(cliente => {
    slots.push(`<div class="client-badge" title="${cliente}">${cliente}</div>`);
  });

  for(let i = 0; i < emptyCount; i++){
    slots.push(`<div class="client-badge empty"></div>`);
  }

  return slots.join('');
}

function getTemperatureStyle(temp){
  if(temp >= 0) return 'linear-gradient(135deg,#16a34a,#22c55e)';
  if(temp > -10) return 'linear-gradient(135deg,#0891b2,#06b6d4)';
  if(temp > -20) return 'linear-gradient(135deg,#2563eb,#3b82f6)';
  if(temp > -25) return 'linear-gradient(135deg,#4338ca,#6366f1)';
  return 'linear-gradient(135deg,#7e22ce,#a855f7)';
}

function formatTemperature(temp){

function renderNode(node){
  if(node.custom === 'mapa_boxes'){
    renderMapaBoxes();
    return;
  }

  const items = node.children || [];
  const level = historyStack.length;

  screenTitle.textContent = level ? node.title : 'BIENVENIDOS AL SISTEMA DE GRUPO CINA';
  screenSubtitle.textContent = 'SISTEMA DE GESTION DE OPERACIONES';

  menuGrid.className = `menu-grid ${getGridLayout(items.length || 1)}`;
  menuGrid.innerHTML = '';

  if(!items.length){
    const tile = document.createElement('button');
    tile.className = 'tile';
    tile.type = 'button';
    tile.style.background = 'linear-gradient(135deg,#163A7A,#0C2554)';
    tile.innerHTML = `
      <div class="tile-icon">${getIconMarkup(node.title)}</div>
      <div class="tile-title ${titleClass(node.title)}">${formatTitle(node.title)}</div>
    `;
    if(node.url) tile.addEventListener('click', () => openModule(node.url));
    menuGrid.appendChild(tile);
  } else {
    items.forEach((item) => {
      const colors = getTileColors(item, level);
      const tile = document.createElement('button');
      tile.className = 'tile';
      tile.type = 'button';
      tile.style.background = `linear-gradient(135deg,${colors.start},${colors.end})`;
      tile.innerHTML = `
        <div class="tile-icon">${getIconMarkup(item.title)}</div>
        <div class="tile-title ${titleClass(item.title)}">${formatTitle(item.title)}</div>
      `;

      tile.addEventListener('click', () => {
        if(item.title === 'MAPA DE BOXES'){
          historyStack.push(node);
          renderMapaBoxes();
          return;
        }

        if(item.title === 'DASHBOARD LOGISTICA NACIONAL'){
          historyStack.push(node);
          renderDashboardLogisticaNacional();
          return;
        }

        if(item.title === 'DASHBOARD EQUIPAMIENTO'){
          historyStack.push(node);
          renderDashboardEquipamiento();
          return;
        }

        if(item.children){
          historyStack.push(node);
          renderNode(item);
          return;
        }

        if(item.url){
          openModule(item.url);
          return;
        }

        historyStack.push(node);
        renderNode({ title: item.title, url: item.url, children: [] });
      });

      menuGrid.appendChild(tile);
    });
  }

  backBtn.disabled = historyStack.length === 0;
}

function updateAdaptiveLayout(){
  const isFullscreen = !!document.fullscreenElement;
  const isSmallWindow = window.innerHeight < 920 || window.innerWidth < 1500;

  if(!isFullscreen || isSmallWindow){
    document.body.classList.add('compact-mode');
  } else {
    document.body.classList.remove('compact-mode');
  }
}

});

  }catch(e){
    console.error('No se pudo cambiar el modo de pantalla completa', e);

});
