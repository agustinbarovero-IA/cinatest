<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sistema Grupo CINA</title>
<style>
:root{
  --bg-main:#001F60;
  --bg-deep:#00174a;
  --bg-dark:#000f30;
  --text:#ffffff;
  --text-soft:rgba(255,255,255,.82);
  --shadow-main:0 18px 38px rgba(0,0,0,.28);
  --radius-lg:22px;
  --gap:18px;
  --grid-max:1320px;
}
*{box-sizing:border-box}

html,body{
  margin:0;
  min-height:100vh;
  font-family:"Segoe UI",Inter,Tahoma,Verdana,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left,rgba(54,176,201,.22),transparent 26%),
    radial-gradient(circle at bottom right,rgba(0,168,135,.18),transparent 24%),
    linear-gradient(135deg,var(--bg-main),var(--bg-deep) 55%,var(--bg-dark));
  overflow:hidden;
}

body{
  min-height:100vh;
}

.app-shell{
  display:grid;
  grid-template-rows:auto auto 1fr auto;
  gap:14px;
  padding:18px;
  min-height:100vh;
}

.topbar{
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  gap:16px;
  padding:16px 22px;
  border-radius:26px;
  background:rgba(255,255,255,.08);
  box-shadow:var(--shadow-main);
}

.brand{
  display:flex;
  align-items:center;
  gap:18px;
  min-width:0;
}

.brand img{
  height:64px;
  width:auto;
  object-fit:contain;
}

.brand-copy{min-width:0;}

.brand h1{
  margin:0;
  font-size:1.6rem;
  font-weight:700;
}

.brand p{
  margin:6px 0 0;
  color:var(--text-soft);
  font-size:.95rem;
}

.toolbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.toolbar button{
  background:rgba(255,255,255,.1);
  border:0;
  color:white;
  padding:12px 16px;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
  transition:background .18s ease, transform .18s ease;
}

.toolbar button:hover:not(:disabled){
  background:rgba(255,255,255,.18);
  transform:translateY(-1px);
}

.toolbar button:disabled{
  opacity:.45;
  cursor:not-allowed;
}

.toolbar .btn-user{
  background:linear-gradient(135deg,#36B0C9,#00A887);
}

.meta-panel{
  display:block;
}

.data-strip{
  display:grid;
  grid-template-columns:repeat(8,minmax(0,1fr));
  gap:10px;
}

.data-box{
  min-height:68px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:10px 12px;
  font-size:.82rem;
  font-weight:700;
  color:#fff;
  box-shadow:var(--shadow-main);
  line-height:1.1;
}

.data-box.green{background:linear-gradient(135deg,#047857,#059669)}
.data-box.red{background:linear-gradient(135deg,#b91c1c,#dc2626)}
.data-box.orange{background:linear-gradient(135deg,#ea580c,#f97316)}
.data-box.qr{
  background:linear-gradient(135deg,#001F60,#36B0C9);
  cursor:pointer;
  transition:transform .18s ease,filter .18s ease;
}
.data-box.qr:hover{
  transform:translateY(-2px);
  filter:brightness(1.05);
}

.data-content{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  width:100%;
}

.data-stack{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  line-height:1;
  gap:4px;
}

.data-number{
  font-size:1.9rem;
  font-weight:800;
}

.data-icon-round{
  width:24px;
  height:24px;
  border-radius:50%;
  border:2px solid currentColor;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:.95rem;
  font-weight:900;
  flex-shrink:0;
}

.data-label{
  font-size:.62rem;
  font-weight:700;
  letter-spacing:.2px;
  text-transform:uppercase;
  opacity:.95;
}

.data-qr-icon{
  width:28px;
  height:28px;
  border:2px solid #fff;
  position:relative;
  flex-shrink:0;
}

.data-qr-icon::before,
.data-qr-icon::after{
  content:"";
  position:absolute;
  background:#fff;
}

.data-qr-icon::before{
  left:4px;
  top:4px;
  width:6px;
  height:6px;
  box-shadow:10px 0 #fff,0 10px #fff,10px 10px #fff;
}

.data-qr-icon::after{
  right:4px;
  bottom:4px;
  width:8px;
  height:8px;
  box-shadow:-10px 0 #fff,0 -10px #fff;
}

.workspace{
  min-height:0;
  overflow:auto;
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

.menu-wrap{
  width:100%;
  max-width:var(--grid-max);
  min-height:0;
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

.menu-grid{
  display:grid;
  gap:var(--gap);
  justify-content:center;
  align-content:start;
  width:100%;
}

.menu-grid.layout-4x4{
  grid-template-columns:repeat(4,minmax(150px,1fr));
  max-width:900px;
}

.menu-grid.layout-8x2{
  grid-template-columns:repeat(8,minmax(120px,1fr));
  max-width:1320px;
}

.tile{
  min-height:150px;
  aspect-ratio:1/1;
  border:none;
  border-radius:var(--radius-lg);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  gap:16px;
  padding:18px 12px;
  color:white;
  font-weight:700;
  font-size:1rem;
  text-transform:uppercase;
  box-shadow:var(--shadow-main);
  cursor:pointer;
  transition:transform .18s ease,filter .18s ease, box-shadow .18s ease;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.18);
}

.tile:hover{
  transform:translateY(-4px);
  filter:brightness(1.06);
  box-shadow:0 22px 42px rgba(0,0,0,.34);
}

.tile-icon{
  width:70px;
  height:70px;
  border-radius:20px;
  background:rgba(255,255,255,.18);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:2rem;
  flex-shrink:0;
  overflow:hidden;
}

.tile-icon img{
  display:block;
  max-width:52px;
  max-height:52px;
  object-fit:contain;
}

.tile-title{
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  line-height:1.12;
  min-height:2.8em;
  max-width:94%;
  word-break:normal;
  overflow-wrap:anywhere;
  hyphens:none;
}

.tile-title.two-lines{white-space:normal}
.tile-title.one-line{white-space:nowrap}

.dashboard-grid{
  width:100%;
  max-width:1320px;
  display:grid;
  grid-template-columns:repeat(3,minmax(280px,1fr));
  gap:18px;
  align-content:start;
}

.dashboard-card{
  min-height:170px;
  border-radius:22px;
  padding:16px 18px;
  background:linear-gradient(135deg,#163A7A,#0C2554);
  box-shadow:var(--shadow-main);
  border:1px solid rgba(255,255,255,.18);
  display:grid;
  grid-template-columns:78px 1fr 88px;
  gap:14px;
  align-items:center;
  color:#fff;
  cursor:pointer;
  transition:transform .18s ease, filter .18s ease, box-shadow .18s ease;
}

.dashboard-card:hover{
  transform:translateY(-4px);
  filter:brightness(1.05);
  box-shadow:0 22px 42px rgba(0,0,0,.34);
}

.dashboard-temp{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  border-radius:18px;
  background:rgba(255,255,255,.10);
  min-height:118px;
  padding:10px 6px;
}

.dashboard-temp-label{
  font-size:.62rem;
  font-weight:700;
  letter-spacing:.8px;
  text-transform:uppercase;
  opacity:.9;
}

.dashboard-temp-value{
  margin-top:8px;
  font-size:1.2rem;
  font-weight:800;
  line-height:1.05;
}

.dashboard-main{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  min-width:0;
}

.dashboard-title{
  font-size:1.05rem;
  font-weight:800;
  text-transform:uppercase;
  line-height:1.1;
  margin-bottom:10px;
}

.dashboard-number{
  font-size:2.2rem;
  font-weight:900;
  line-height:1;
}

.dashboard-sub{
  margin-top:8px;
  font-size:.68rem;
  font-weight:700;
  letter-spacing:.7px;
  text-transform:uppercase;
  opacity:.85;
}

.dashboard-clients{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  align-content:center;
  justify-items:center;
}

.client-badge{
  width:30px;
  height:30px;
  border-radius:10px;
  background:rgba(255,255,255,.16);
  border:1px solid rgba(255,255,255,.18);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:.72rem;
  font-weight:800;
  text-transform:uppercase;
}

.client-badge.empty{
  opacity:.18;
}

.footer-bar{
  text-align:center;
  font-size:.8rem;
  opacity:.7;
}

@media(max-width:1200px){
  .menu-grid.layout-8x2{
    grid-template-columns:repeat(4,minmax(140px,1fr));
    max-width:900px;
  }
  .data-strip{
    grid-template-columns:repeat(4,minmax(0,1fr));
  }
  .dashboard-grid{
    grid-template-columns:repeat(2,minmax(280px,1fr));
  }
}

@media(max-width:780px){
  html,body{overflow:auto}
  .topbar{grid-template-columns:1fr}
  .menu-grid.layout-4x4,
  .menu-grid.layout-8x2{
    grid-template-columns:repeat(2,minmax(130px,1fr));
    max-width:100%;
  }
  .data-strip{
    grid-template-columns:repeat(2,minmax(0,1fr));
  }
  .tile{
    font-size:.9rem;
  }
  .dashboard-grid{
    grid-template-columns:1fr;
  }
  .dashboard-card{
    grid-template-columns:70px 1fr 80px;
  }
  .dashboard-number{
    font-size:1.9rem;
  }
  #fullscreenBtn{
    display:none;
  }
}
</style>
</head>

function getTextInitials(text){
  return text.split(/\s+/).filter(Boolean).slice(0,2).map(word => word[0]).join('').toUpperCase();
}

function getIconMarkup(title){
  const imageMap = {
    'SISTEMA DE GESTION': 'iso_logo.png',
    'SENASA': 'senasa_logo.png'
  };

  if(imageMap[title]){
    return `<img src="${imageMap[title]}" alt="${title}" onerror="this.style.display='none'; this.parentElement.textContent='${getTextInitials(title)}';">`;
  }

  const symbolMap = {
    'LOGISTICA NACIONAL':'🚛',
    'LOGISTICA FISCAL':'📦',
    'CALIDAD':'🌡',
    'PORTERIA':'🚪',
    'TRANSPORTE':'🚚',
    'INDICADORES':'📊',
    'REPORTES':'📑',
    'DASHBOARD':'🖥',
    'ADMINISTRACION':'🗂',
    'RRHH':'👥',
    'MANTENIMIENTO':'🔧',
    'CONFIGURACION':'⚙',
    'PRODUCTOS':'📦',
    'OTROS SISTEMAS':'🧩',
    'INFORMACION DOCUMENTADA':'📚',
    'REGISTRO PR 44':'🗂',
    'FORMACION':'👨‍🏫'
  };

  return symbolMap[title] || getTextInitials(title);
}

function getGridLayout(count){
  return count > 8 ? 'layout-8x2' : 'layout-4x4';
}

function formatTitle(title){
  const words = title.trim().split(/\s+/);
  if(words.length <= 1) return title;
  if(words.length === 2) return words[0] + '<br>' + words[1];
  if(words.length === 3) return words[0] + ' ' + words[1] + '<br>' + words[2];
  if(words.length === 4) return words[0] + ' ' + words[1] + '<br>' + words[2] + ' ' + words[3];
  if(words.length === 5) return words[0] + ' ' + words[1] + '<br>' + words[2] + ' ' + words[3] + ' ' + words[4];
  const mid = Math.ceil(words.length / 2);
  return words.slice(0, mid).join(' ') + '<br>' + words.slice(mid).join(' ');
}

function titleClass(title){
  const words = title.trim().split(/\s+/).length;
  return words >= 2 ? 'two-lines' : 'one-line';
}

function openModule(url){
  window.open(url, '_blank', 'noopener,noreferrer');
}

function darkenColor(hex, amount){
  let color = hex.replace('#', '');
  if (color.length === 3) {
    color = color.split('').map(c => c + c).join('');
  }

  let r = parseInt(color.substring(0,2),16);
  let g = parseInt(color.substring(2,4),16);
  let b = parseInt(color.substring(4,6),16);

  r = Math.max(0, Math.min(255, r + amount));
  g = Math.max(0, Math.min(255, g + amount));
  b = Math.max(0, Math.min(255, b + amount));

  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

function getTileColors(item, level){
  const base = level === 0
    ? (mainColorMap[item.title] || '#001F60')
    : '#163A7A';

  const end = darkenColor(base, -28);
  return { start: base, end };
}

function buildClientSlots(clientes){
  const totalSlots = 6;
  const filled = clientes.slice(0, totalSlots);
  const emptyCount = totalSlots - filled.length;
  const slots = [];

  filled.forEach(cliente => {
    slots.push(`<div class="client-badge" title="${cliente}">${cliente}</div>`);
  });

  for(let i = 0; i < emptyCount; i++){
    slots.push(`<div class="client-badge empty"></div>`);
  }

  return slots.join('');
}

function renderDashboardLogisticaNacional(){
  screenTitle.textContent = 'DASHBOARD LOGISTICA NACIONAL';
  screenSubtitle.textContent = 'OCUPACION Y CLIENTES POR CAMARA';
  menuGrid.className = '';
  menuGrid.innerHTML = '';

  const dashboardGrid = document.createElement('div');
  dashboardGrid.className = 'dashboard-grid';

  dashboardLogisticaNacionalData.forEach(item => {
    const card = document.createElement('button');
    card.className = 'dashboard-card';
    card.type = 'button';

    card.innerHTML = `
      <div class="dashboard-temp">
        <div class="dashboard-temp-label">Temp.</div>
        <div class="dashboard-temp-value">${item.temperatura}</div>
      </div>

      <div class="dashboard-main">
        <div class="dashboard-title">CAMARA ${item.camara}</div>
        <div class="dashboard-number">${item.valor}</div>
        <div class="dashboard-sub">POSICIONES / STOCK</div>
      </div>

      <div class="dashboard-clients">
        ${buildClientSlots(item.clientes)}
      </div>
    `;

    dashboardGrid.appendChild(card);
  });

  menuGrid.appendChild(dashboardGrid);
  backBtn.disabled = historyStack.length === 0;
}

function renderNode(node){
  const items = node.children || [];
  const level = historyStack.length;

  screenTitle.textContent = level ? node.title : 'BIENVENIDOS AL SISTEMA DE GRUPO CINA';
  screenSubtitle.textContent = 'SISTEMA DE GESTION DE OPERACIONES';

  menuGrid.className = `menu-grid ${getGridLayout(items.length || 1)}`;
  menuGrid.innerHTML = '';

  if(!items.length){
    const tile = document.createElement('button');
    tile.className = 'tile';
    tile.type = 'button';
    tile.style.background = 'linear-gradient(135deg,#163A7A,#0C2554)';
    tile.innerHTML = `
      <div class="tile-icon">${getIconMarkup(node.title)}</div>
      <div class="tile-title ${titleClass(node.title)}">${formatTitle(node.title)}</div>
    `;
    if(node.url) tile.addEventListener('click', () => openModule(node.url));
    menuGrid.appendChild(tile);
  } else {
    items.forEach((item) => {
      const colors = getTileColors(item, level);
      const tile = document.createElement('button');
      tile.className = 'tile';
      tile.type = 'button';
      tile.style.background = `linear-gradient(135deg,${colors.start},${colors.end})`;
      tile.innerHTML = `
        <div class="tile-icon">${getIconMarkup(item.title)}</div>
        <div class="tile-title ${titleClass(item.title)}">${formatTitle(item.title)}</div>
      `;

      tile.addEventListener('click', () => {
        if(item.title === 'DASHBOARD LOGISTICA NACIONAL'){
          historyStack.push(node);
          renderDashboardLogisticaNacional();
          return;
        }

        if(item.children){
          historyStack.push(node);
          renderNode(item);
          return;
        }

        if(item.url){
          openModule(item.url);
          return;
        }

        historyStack.push(node);
        renderNode({ title: item.title, url: item.url, children: [] });
      });

      menuGrid.appendChild(tile);
    });
  }

  backBtn.disabled = historyStack.length === 0;
}

backBtn.addEventListener('click', () => {
  if(!historyStack.length) return;
  const previous = historyStack.pop();
  renderNode(previous);
});

homeBtn.addEventListener('click', () => {
  historyStack.length = 0;
  renderNode(menuTree);
