<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema Grupo CINA</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="app-shell">

<header class="topbar">

<div class="brand">
<img src="img/cina_logo_principal.png">

<div class="brand-copy">
<h1 id="screenTitle">BIENVENIDOS AL SISTEMA DE GRUPO CINA</h1>
<p id="screenSubtitle">SISTEMA DE GESTION DE OPERACIONES</p>
</div>
</div>

<div class="toolbar">
<button id="backBtn">← Volver</button>
<button id="homeBtn">Inicio</button>
<button id="fullscreenBtn">Pantalla completa</button>
<button id="userBtn" class="btn-user">Administrar usuario</button>
</div>

</header>

<section class="meta-panel">

<div class="data-strip">

<div class="data-box green">
<div class="data-stack">
<span class="data-label">TUNEL 2</span>
<span class="data-number">35</span>
<span class="data-label">09/03/2026 01:00</span>
</div>
</div>

<div class="data-box qr" id="qrBox">
<div class="data-content">
<span class="data-qr-icon"></span>
<span>SCAN QR</span>
</div>
</div>

</div>

</section>

<main class="workspace">

<div class="menu-wrap">
<div class="menu-grid" id="menuGrid"></div>
</div>

</main>

<footer class="footer-bar">
Sistema interno Grupo CINA
</footer>

</div>


<script src="js/data.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/estiba.js"></script>
<script src="js/app.js"></script>

</body>
</html>
