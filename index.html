<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sistema Grupo CINA</title>

<style>
:root{
--bg-main:#001F60;
--bg-deep:#00174a;
--bg-dark:#000f30;
--text:#ffffff;
--text-soft:rgba(255,255,255,0.8);
--shadow-main:0 22px 45px rgba(0,0,0,0.28);
--radius-lg:22px;
--gap:18px;
--card-size-min:150px;
--max-grid-width:1320px;
}

*{box-sizing:border-box}

html,body{
margin:0;
font-family:"Segoe UI",Inter,Tahoma,Verdana,sans-serif;
color:var(--text);
background:
radial-gradient(circle at top left,rgba(54,176,201,0.22),transparent 26%),
radial-gradient(circle at bottom right,rgba(0,168,135,0.18),transparent 24%),
linear-gradient(135deg,var(--bg-main),var(--bg-deep) 55%,var(--bg-dark));
min-height:100vh;
overflow:hidden;
}

.app-shell{
display:grid;
grid-template-rows:auto auto 1fr auto;
gap:14px;
padding:18px;
min-height:100vh;
}

.topbar{
display:grid;
grid-template-columns:1fr auto;
align-items:center;
gap:16px;
padding:16px 22px;
border-radius:26px;
background:rgba(255,255,255,0.08);
box-shadow:var(--shadow-main);
}

.brand{
display:flex;
align-items:center;
gap:18px;
}

.brand img{
height:64px;
}

.brand h1{
margin:0;
font-size:1.6rem;
font-weight:700;
}

.toolbar button{
background:rgba(255,255,255,0.1);
border:0;
color:white;
padding:12px 16px;
border-radius:12px;
font-weight:600;
cursor:pointer;
}

.toolbar button:hover{background:rgba(255,255,255,0.18)}

.meta-panel{
display:flex;
justify-content:space-between;
align-items:center;
}

.breadcrumbs{
padding:10px 14px;
border-radius:14px;
background:rgba(255,255,255,0.08);
font-size:.9rem;
}

.workspace{
overflow:auto;
display:flex;
justify-content:center;
}

.menu-wrap{
max-width:var(--max-grid-width);
width:100%;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(var(--card-size-min),1fr));
gap:var(--gap);
}

.tile{
aspect-ratio:1/1;
border-radius:var(--radius-lg);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
gap:16px;
padding:18px;
color:white;
font-weight:700;
font-size:1rem;
text-transform:uppercase;
white-space:nowrap;
box-shadow:var(--shadow-main);
cursor:pointer;
}

.tile:hover{transform:translateY(-4px)}

.tile-icon{
width:70px;
height:70px;
border-radius:20px;
background:rgba(255,255,255,0.18);
display:flex;
align-items:center;
justify-content:center;
font-size:1.1rem;
}

.footer-bar{
text-align:center;
font-size:.8rem;
opacity:.7;
}

@media(max-width:640px){
.menu-grid{grid-template-columns:repeat(auto-fit,minmax(130px,1fr))}
.tile{font-size:.9rem}
}

</style>
</head>

<body>

<div class="app-shell">

<header class="topbar">

<div class="brand">
<img src="cina_logo_principal.png" alt="CINA">
<h1 id="screenTitle">BIENVENIDOS AL SISTEMA DE GRUPO CINA</h1>
</div>

<div class="toolbar">
<button id="backBtn">← Volver</button>
<button id="homeBtn">Inicio</button>
<button id="fullscreenBtn">Pantalla completa</button>
</div>

</header>

<section class="meta-panel">
<div class="breadcrumbs" id="breadcrumb">Inicio</div>
<div id="moduleCounter">16 módulos</div>
</section>

<main class="workspace">
<div class="menu-wrap">
<div class="menu-grid" id="menuGrid"></div>
</div>
</main>

<footer class="footer-bar">
Sistema interno Grupo CINA
</footer>

</div>

<script>

const menuTree={
 title:"Inicio",
 children:[
 {title:"Logistica nacional"},
 {title:"Logistica fiscal"},
 {title:"Calidad"},
 {title:"Porteria"},
 {title:"Transporte"},
 {title:"Sistema de gestion"},
 {title:"Indicadores"},
 {title:"Reportes"},
 {title:"Senasa"},
 {title:"Dashboard"},
 {title:"Administracion"},
 {title:"RRHH"},
 {title:"Mantenimiento"},
 {title:"Sistema"},
 {title:"Productos"},
 {title:"Otros sistemas"}
 ]
}

const palette=[
['#001F60','#002A80'],
['#36B0C9','#2898AC'],
['#00BBB4','#009F99'],
['#00A887','#00846B'],
['#007A4C','#005E3A']
]

const menuGrid=document.getElementById('menuGrid')
const moduleCounter=document.getElementById('moduleCounter')

function render(){

menuGrid.innerHTML=""

menuTree.children.forEach((item,i)=>{

const colors=palette[i%palette.length]

const tile=document.createElement('div')

tile.className='tile'

tile.style.background=`linear-gradient(135deg,${colors[0]},${colors[1]})`

tile.innerHTML=`
<div class="tile-icon">${item.title.substring(0,2).toUpperCase()}</div>
<div>${item.title.toUpperCase()}</div>
`

menuGrid.appendChild(tile)

})

moduleCounter.innerText=menuTree.children.length+" módulos"

}

render()

const fullscreenBtn=document.getElementById('fullscreenBtn')

fullscreenBtn.onclick=()=>{
if(!document.fullscreenElement){
document.documentElement.requestFullscreen()
}else{
document.exitFullscreen()
}
}

</script>

</body>
</html>
